<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Price Predictor & AI Agent</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface-2: #1a1a2e;
            --accent: #10b981;
            --accent-glow: rgba(16, 185, 129, 0.12);
            --text: #e8e8f0;
            --text-muted: #8888a0;
            --border: rgba(255, 255, 255, 0.06);
            --radius: 16px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f url('/static/bg.png') no-repeat center center fixed;
            background-size: cover;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            margin: 0;
            position: relative;
        }

        .container {
            width: 100%;
            max-width: 640px;
            backdrop-filter: blur(12px);
            background: rgba(0, 0, 0, 0.4);
            border-radius: 24px;
            padding: 2.5rem;
            border: 1px solid rgba(16, 185, 129, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.25rem;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        .card {
            background: rgba(18, 18, 26, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .field label {
            display: block;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.4rem;
        }

        .field input,
        .field select {
            width: 100%;
            padding: 0.75rem;
            background: rgba(26, 26, 46, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .field input:focus,
        .field select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .toggle-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .toggle {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(26, 26, 46, 0.4);
            padding: 0.6rem 0.8rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .toggle:hover {
            border-color: rgba(16, 185, 129, 0.3);
            background: rgba(16, 185, 129, 0.05);
        }

        .toggle input {
            display: none;
        }

        .toggle .dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid var(--text-muted);
            transition: all 0.2s;
        }

        .toggle input:checked+.dot {
            background: var(--accent);
            border-color: var(--accent);
        }

        button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--accent), #059669);
            border: none;
            border-radius: 12px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 30px var(--accent-glow);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result {
            display: none;
            text-align: center;
            padding: 2rem;
            background: var(--surface);
            border: 1px solid var(--accent);
            border-radius: var(--radius);
            margin-top: 1.5rem;
        }

        .result.show {
            display: block;
        }

        .price {
            font-size: 3rem;
            font-weight: 700;
            color: var(--accent);
        }

        .price-label {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }

        /* AI Agent Section */
        .ai-analysis {
            margin-top: 1.5rem;
            padding: 1.5rem;
            background: rgba(18, 18, 26, 0.8);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: var(--radius);
            text-align: left;
            display: none;
        }

        .ai-analysis p {
            font-size: 0.95rem;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 1rem;
        }

        .ai-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .loading-shimmer {
            height: 20px;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.05) 25%, rgba(255, 255, 255, 0.1) 50%, rgba(255, 255, 255, 0.05) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 4px;
            margin-bottom: 10px;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        /* Settings Modal */
        .settings-btn {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: all 0.2s;
            font-size: 1.2rem;
        }

        .settings-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: var(--surface-2);
            padding: 2rem;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .modal h2 {
            margin-bottom: 0.5rem;
            font-size: 1.25rem;
        }

        .modal p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        .modal input {
            width: 100%;
            margin-bottom: 1rem;
        }
    </style>

    <link rel="icon" type="image/png" href="/static/favicon.png">
</head>

<body>
    <button class="settings-btn" onclick="openModal()">⚙️</button>

    <div class="modal-overlay" id="api-modal">
        <div class="modal">
            <h2>Gemini AI Agent Setup</h2>
            <p>Enter a free Google Gemini API Key to enable real-time internet search and market trend analysis.</p>
            <div class="field">
                <input type="password" id="gemini-key" placeholder="AIzaSy...">
            </div>
            <button onclick="saveApiKey()">Save Key</button>
            <p style="margin-top:1rem; font-size:0.75rem;"><a href="https://aistudio.google.com/app/apikey"
                    target="_blank" style="color:var(--accent);">Get a free key here</a></p>
        </div>
    </div>

    <div class="container">
        <h1>🏠 House Price Predictor</h1>
        <p class="subtitle">ML Valuation + Live Web Search Market Agent</p>

        <form id="predict-form">
            <div class="card">
                <div class="grid">
                    <div class="field">
                        <label>Area (sq ft)</label>
                        <input type="number" id="area" value="3000" min="100" required>
                    </div>
                    <div class="field">
                        <label>Bedrooms</label>
                        <input type="number" id="bedrooms" value="3" min="0" max="10" required>
                    </div>
                    <div class="field">
                        <label>Bathrooms</label>
                        <input type="number" id="bathrooms" value="2" min="0" required>
                    </div>
                    <div class="field">
                        <label>Stories</label>
                        <input type="number" id="stories" value="2" min="1" required>
                    </div>
                    <div class="field">
                        <label>Parking Spots</label>
                        <input type="number" id="parking" value="1" min="0" required>
                    </div>
                    <div class="field">
                        <label>Furnishing</label>
                        <select id="furnishingstatus">
                            <option value="unfurnished">Unfurnished</option>
                            <option value="semi-furnished" selected>Semi-Furnished</option>
                            <option value="furnished">Furnished</option>
                        </select>
                    </div>
                </div>
                <div class="toggle-row">
                    <label class="toggle"><input type="checkbox" id="mainroad" checked><span class="dot"></span>Main
                        Road</label>
                    <label class="toggle"><input type="checkbox" id="guestroom"><span class="dot"></span>Guest
                        Room</label>
                    <label class="toggle"><input type="checkbox" id="basement"><span class="dot"></span>Basement</label>
                    <label class="toggle"><input type="checkbox" id="hotwaterheating"><span class="dot"></span>Hot
                        Water</label>
                    <label class="toggle"><input type="checkbox" id="airconditioning" checked><span
                            class="dot"></span>AC</label>
                    <label class="toggle"><input type="checkbox" id="prefarea"><span class="dot"></span>Preferred
                        Area</label>
                </div>
            </div>
            <button type="submit" id="submit-btn">💰 Predict & Analyze</button>
        </form>

        <div class="result" id="result">
            <div class="price" id="price-value">—</div>
            <div class="price-label">Baseline Predictive Valuation</div>
        </div>

        <div class="ai-analysis" id="ai-analysis">
            <div class="ai-header">🤖 Agentic Market Analysis (Live Web Search)</div>
            <div id="ai-content"></div>
        </div>
    </div>

    <script>
        // API Key Management
        function openModal() {
            document.getElementById('api-modal').classList.add('show');
            document.getElementById('gemini-key').value = localStorage.getItem('gemini_api_key') || '';
        }
        function saveApiKey() {
            const key = document.getElementById('gemini-key').value;
            if (key) localStorage.setItem('gemini_api_key', key);
            document.getElementById('api-modal').classList.remove('show');
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (!localStorage.getItem('gemini_api_key')) {
                openModal();
            }
        });

        // Prediction & AI Analysis Logic
        document.getElementById('predict-form').addEventListener('submit', async e => {
            e.preventDefault();
            const apiKey = localStorage.getItem('gemini_api_key');
            if (!apiKey) return openModal();

            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerHTML = '🔄 Processing...';

            // 1. Calculate Baseline Price (Heuristic fallback simulating XGBoost)
            const area = +document.getElementById('area').value;
            const bedrooms = +document.getElementById('bedrooms').value;
            const bathrooms = +document.getElementById('bathrooms').value;

            let basePrice = 200000 + (area * 80) + (bedrooms * 25000) + (bathrooms * 30000);
            if (document.getElementById('airconditioning').checked) basePrice += 40000;
            if (document.getElementById('prefarea').checked) basePrice += 100000;

            document.getElementById('price-value').textContent = '$' + Math.round(basePrice).toLocaleString();
            document.getElementById('result').classList.add('show');

            // 2. Trigger Gemini Market Analysis Agent
            const aiSection = document.getElementById('ai-analysis');
            const aiContent = document.getElementById('ai-content');
            aiSection.style.display = 'block';
            aiContent.innerHTML = '<div class="loading-shimmer"></div><div class="loading-shimmer" style="width:80%"></div><div class="loading-shimmer" style="width:60%"></div><p style="color:var(--accent); font-size:0.85rem; margin-top:1rem;">Running Google Search to find current housing trends...</p>';

            try {
                // Call Gemini 1.5 Flash with Google Search Grounding
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: `You are an expert real estate market analyst. A user is looking at a property with ${area} sq ft, ${bedrooms} bedrooms, ${bathrooms} bathrooms. Is in preferred area: ${document.getElementById('prefarea').checked}. Has AC: ${document.getElementById('airconditioning').checked}. The baseline algorithmic prediction is $${Math.round(basePrice).toLocaleString()}.
                                
                                Task: Search the internet for the most recent housing market trends (average price per square foot, supply/demand, mortgage rates). In 2 concise paragraphs, provide an insightful qualitative analysis of whether this predicted price aligns with current macro trends and if it's a good investment. Keep it professional and format with simple HTML tags (<b>, <br>).`
                            }]
                        }],
                        tools: [{ google_search: {} }]
                    })
                });

                const data = await response.json();

                if (data.error) throw new Error(data.error.message);

                const text = data.candidates[0].content.parts[0].text;
                aiContent.innerHTML = `<p>${text}</p>`;

            } catch (err) {
                aiContent.innerHTML = `<p style="color:#ff4d6a;">❌ Agent Error: ${err.message}. Make sure your API key is valid.</p>`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = '💰 Predict & Analyze';
            }
        });
    </script>
</body>

</html>
